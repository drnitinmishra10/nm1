<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Digit Subtraction Worksheet</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f9ff;
        margin:0;
        padding:20px;
    }

    .container{
        max-width:900px;
        margin:auto;
        background:white;
        padding:25px;
        border-radius:20px;
        box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        color:#1565c0;
    }

    .info{
        display:flex;
        justify-content:space-between;
        margin-bottom:20px;
        font-size:18px;
    }

    .question{
        display:flex;
        align-items:center;
        gap:10px;
        margin:12px 0;
        padding:10px;
        border-radius:10px;
        background:#f8fbff;
    }

    .question span{
        font-size:22px;
        font-weight:bold;
    }

    input{
        width:80px;
        padding:8px;
        font-size:18px;
        border:2px solid #90caf9;
        border-radius:8px;
        text-align:center;
    }

    .correct{
        border-color:green;
        background:#e8f5e9;
    }

    .wrong{
        border-color:red;
        background:#ffebee;
    }

    .result{
        margin-left:10px;
        font-size:22px;
        font-weight:bold;
    }

    .buttons{
        text-align:center;
        margin-top:25px;
    }

    button{
        padding:12px 25px;
        margin:10px;
        border:none;
        border-radius:10px;
        font-size:18px;
        cursor:pointer;
        color:white;
    }

    .check{
        background:#2e7d32;
    }

    .reset{
        background:#c62828;
    }

    .score{
        text-align:center;
        font-size:24px;
        margin-top:20px;
        color:#0d47a1;
        font-weight:bold;
    }

    @media print{
        button{
            display:none;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>2 Digit Subtraction Worksheet (Without Borrow)</h1>

    <div class="info">
        <div>Name: __________________</div>
        <div>Date: __________________</div>
    </div>

    <div id="worksheet"></div>

    <div class="buttons">
        <button class="check" onclick="checkAnswers()">Check Answers</button>
        <button class="reset" onclick="generateWorksheet()">New Worksheet</button>
    </div>

    <div class="score" id="score"></div>
</div>

<script>
const worksheet = document.getElementById("worksheet");

function generateNoBorrowQuestion() {

    let aTens = Math.floor(Math.random() * 9) + 1;
    let aOnes = Math.floor(Math.random() * 10);

    let bTens = Math.floor(Math.random() * (aTens + 1));
    let bOnes = Math.floor(Math.random() * (aOnes + 1));

    let num1 = aTens * 10 + aOnes;
    let num2 = bTens * 10 + bOnes;

    if(num2 > num1){
        [num1, num2] = [num2, num1];
    }

    return {
        num1,
        num2,
        answer: num1 - num2
    };
}

function generateWorksheet() {

    worksheet.innerHTML = "";
    document.getElementById("score").innerHTML = "";

    for(let i = 1; i <= 20; i++) {

        let q = generateNoBorrowQuestion();

        let div = document.createElement("div");
        div.className = "question";

        div.innerHTML = `
            <span>${i}.</span>
            <span>${q.num1}</span>
            <span>-</span>
            <span>${q.num2}</span>
            <span>=</span>
            <input type="number" data-answer="${q.answer}">
            <span class="result"></span>
        `;

        worksheet.appendChild(div);
    }
}

function checkAnswers() {

    let inputs = document.querySelectorAll("input");
    let correct = 0;

    inputs.forEach(input => {

        let userAnswer = parseInt(input.value);
        let correctAnswer = parseInt(input.dataset.answer);
        let result = input.nextElementSibling;

        input.classList.remove("correct", "wrong");

        if(userAnswer === correctAnswer){

            input.classList.add("correct");
            result.innerHTML = "✔";
            result.style.color = "green";
            correct++;

        } else {

            input.classList.add("wrong");
            result.innerHTML = "✘";
            result.style.color = "red";
        }
    });

    document.getElementById("score").innerHTML =
        `Score: ${correct} / 20`;
}

generateWorksheet();
</script>

</body>
</html>
